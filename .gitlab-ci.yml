workflow:
  rules:
    - if: $CI_COMMIT_BRANCH != "toto"

include:
  - project: 'dn-sied/ci-config'
    file: '/.gitlab-ci-template-container-image.yml'

variables:
  MAVEN_IMAGE: maven:3.9.10-eclipse-temurin-21-alpine
  MAVEN_ADDITIONAL_CLI_OPTS: "-Pcoverage,production -Dmaven.test.skip=true"

🚀 container image:
  when: manual
