          deprecated: true
        maitre:
          type: boolean
          description: "Statut maître pour l'INE"
          deprecated: true

    StatutIne:
      type: string
      enum: [ A_VERIFIER, CONFIRME, DONNEES_INCOMPLETES, INCONNU, LITIGE ]
      description: |
        Etat de l'ine maître

    StatutIneRetour:
      type: string
      enum: [CONFIRME, A_VERIFIER, DONNEES_INCOMPLETES, DONNEES_INVALIDES, LITIGE, INCONNU, ERR_IMAT, ERR_VERIF, IMAT_EN_COURS]
      description: |
        Statut du numéro INE retourné dans IDT-SERVER
        
        Valeurs actuellement possibles:

         * CONFIRME: le numéro a été confirmé par INES
         * A_VERIFIER: le numéro INE n'a pas été vérifié par INES
         * INCONNU: l'admis est inconnu d'INES
         * DONNEES_INCOMPLETES: Une donnée personnelle est manquante pour faire appel à INES
         * DONNEES_INVALIDES: Si les données transmises pour vérifier l'INE sont invalides
         * ERR_VERIF: Erreur lors de la vérification INES
         * IMAT_EN_COURS: immatriculation en cours
         * LITIGE: le numéro INE est en cours de litige lors d'une demande d'immatriculation
         * ERR_IMAT: Erreur lors de l'immatriculation INES
    

