      enum:
        - CONFIRME
        - A_VERIFIER
        - DONNEES_INCOMPLETES
        - DONNEES_INVALIDES
        - LITIGE
        - INCONNU
        - ERR_IMAT
        - ERR_VERIF
      description: |
        Statut du numéro INE dans Admission
        
        Valeurs actuellement possibles:
        
         * CONFIRME: le numéro a été confirmé par INES
         * A_VERIFIER: le numéro INE n'a pas été vérifié par INES
         * DONNEES_INCOMPLETES: Une donnée personnelle est manquante pour faire appel à INES
         * DONNEES_INVALIDES: Si les données transmises pour vérifier l'INE sont invalides
         * ERR_VERIF: Erreur lors de la vérification INES
         * LITIGE: le numéro INE est en cours de litige
         * INCONNU: l'admis est inconnu d'INES
         * ERR_IMAT: Erreur lors de l'immatriculation INES

